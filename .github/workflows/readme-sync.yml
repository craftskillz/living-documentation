name: README sync (EN ↔ FR)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so we can diff against the base ref of the PR.
          fetch-depth: 0

      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            # On push to main, compare against the previous commit.
            echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Check README.md ↔ README.fr.md sync
        run: ./scripts/check-readme-sync.sh "${{ steps.base.outputs.ref }}"
