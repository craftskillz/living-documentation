name: README sync (EN ↔ FR)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Full history so we can diff against the base ref of the PR.
          fetch-depth: 0
          persist-credentials: false

      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${GITHUB_BASE_REF}" >> "$GITHUB_OUTPUT"
          else
            # On push to main, compare against the previous commit.
            echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Check README.md ↔ README.fr.md sync
        run: ./scripts/check-readme-sync.sh "${STEPS_BASE_OUTPUTS_REF}"
        env:
          STEPS_BASE_OUTPUTS_REF: ${{ steps.base.outputs.ref }}
