name: zizmor (GitHub Actions audit)

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'

jobs:
  zizmor:
    name: Audit workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      # Required to upload SARIF results to the Security tab.
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run zizmor
        # Pinned to a full commit SHA per zizmor's own quickstart; the trailing
        # comment tracks the human-readable version. Action lives at
        # github.com/zizmorcore/zizmor-action (not `zizmors`, which 404s).
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          # SARIF results land in Security → Code scanning, same place as CodeQL.
          advanced-security: true
