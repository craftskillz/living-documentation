name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20.19.0"
          cache: npm
          # npm 10 (bundled with node 20) is intentional: it writes/reads a
          # platform-complete lockfile (incl. Linux-only optional deps like @emnapi).
          # npm 11 strips foreign-platform optional deps, which breaks `npm ci`.

      - name: Install dependencies
        # --ignore-scripts blocks postinstall hooks, the most common vector for
        # supply-chain attacks in compromised packages. None of our runtime deps
        # rely on a legitimate postinstall.
        run: npm ci --ignore-scripts

      - name: Verify npm registry signatures on all dependencies
        # Rejects tarballs whose signed hash doesn't match what the npm registry
        # published (catches yanked-and-republished packages).
        run: npm audit signatures

      - name: Build project
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
