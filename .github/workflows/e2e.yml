name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # --ignore-scripts blocks postinstall hooks, the most common vector for
        # supply-chain attacks in compromised packages. None of our runtime deps
        # rely on a legitimate postinstall.
        run: npm ci --ignore-scripts

      - name: Verify npm registry signatures on all dependencies
        # Rejects tarballs whose signed hash doesn't match what the npm registry
        # published (catches yanked-and-republished packages).
        run: npm audit signatures

      - name: Build project
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
