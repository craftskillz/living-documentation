name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20.19.0"
          cache: npm
          # npm 10 (bundled with node 20) is intentional: it writes/reads a
          # platform-complete lockfile (incl. Linux-only optional deps like @emnapi).
          # npm 11 strips foreign-platform optional deps, which breaks `npm ci`.

      - name: Install dependencies
        # --ignore-scripts blocks postinstall hooks, the most common vector for
        # supply-chain attacks in compromised packages. None of our runtime deps
        # rely on a legitimate postinstall.
        run: npm ci --ignore-scripts

      - name: Verify npm registry signatures on all dependencies
        # Rejects tarballs whose signed hash doesn't match what the npm registry
        # published (catches yanked-and-republished packages).
        run: npm audit signatures

      - name: Lint (Biome)
        # Fails only on error-level diagnostics (see biome.json scope). Warnings
        # and infos stay advisory so pre-existing style debt doesn't block CI.
        run: npm run lint:ci

      - name: Build project
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests with coverage
        # COVERAGE=1 makes the harness spawn the built server as a subprocess so
        # its V8 coverage is captured; NODE_V8_COVERAGE is inherited by that child.
        run: |
          mkdir -p coverage/tmp
          npx playwright test
        env:
          COVERAGE: "1"
          NODE_V8_COVERAGE: coverage/tmp

      - name: Coverage gate
        # Thresholds live in .c8rc.json (check-coverage). Fails the build if
        # backend coverage regresses below the configured floor.
        run: npx c8 report

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
